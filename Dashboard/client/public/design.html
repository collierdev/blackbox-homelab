<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Intelligence Console</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#0b1326;color:#e2e8f0;font-family:'Inter',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#243356;border-radius:2px}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:'Inter',sans-serif;color:#e2e8f0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── TOKENS ──────────────────────────────────────────────
const C = {
  bg:    '#0b1326',
  l0:    '#0f1a2e',
  l1:    '#121f38',
  l2:    '#162040',
  l3:    '#1c2a4a',
  l4:    '#243356',
  bright:'#2a3d6a',
  blue:  '#adc6ff',
  amber: '#f7be1d',
  green: '#22c55e',
  red:   '#ffb4ab',
  text:  '#e2e8f0',
  dim:   '#c2c6d6',
  dimmer:'#8892a4',
};

// ── MINI ICONS (inline SVG) ─────────────────────────────
const Icon = ({ name, size=16, color='currentColor', style={} }) => {
  const s = { width:size, height:size, display:'inline-block', flexShrink:0, ...style };
  const paths = {
    cpu:        <><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></>,
    memory:     <><path d="M6 19v-3M10 19v-3M14 19v-3M18 19v-3M8 11V9M16 11V9"/><rect x="2" y="3" width="20" height="14" rx="2"/></>,
    hdd:        <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></>,
    thermometer:<><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></>,
    wifi:       <><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></>,
    home:       <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    calendar:   <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    clipboard:  <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></>,
    code:       <><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>,
    bot:        <><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M9 18v2M15 18v2"/><circle cx="9" cy="13" r="1" fill="currentColor"/><circle cx="15" cy="13" r="1" fill="currentColor"/></>,
    settings:   <><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></>,
    bell:       <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    moon:       <><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
    radio:      <><circle cx="12" cy="12" r="2"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14M19.07 4.93a10 10 0 0 1 0 14.14M9 12a3 3 0 1 0 6 0 3 3 0 0 0-6 0"/></>,
    folder:     <><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>,
    file:       <><path d="M14 2H6a2 2 0 0 1-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 1 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
    filepy:     <><path d="M14 2H6a2 2 0 0 1-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 1 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
    chevright:  <><polyline points="9 18 15 12 9 6"/></>,
    chevdown:   <><polyline points="6 9 12 15 18 9"/></>,
    chevleft:   <><polyline points="15 18 9 12 15 6"/></>,
    plus:       <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    check:      <><polyline points="20 6 9 17 4 12"/></>,
    x:          <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    send:       <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    mic:        <><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 19v3M8 23h8"/></>,
    paperclip:  <><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></>,
    copy:       <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
    lightbulb:  <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6M10 22h4"/></>,
    plug:       <><path d="M12 22v-5M9 8V2M15 8V2M18 8H6a1 1 0 0 0 0 10 2 2 0 0 0 4 0 2 2 0 0 0 4 0 1 1 0 0 0 0-10z"/></>,
    camera:     <><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
    network:    <><rect x="9" y="9" width="6" height="6" rx="1"/><path d="M9 12H3M15 12h6M12 9V3M12 15v6"/></>,
    clock:      <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
    zap:        <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
    lock:       <><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
    droplet:    <><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></>,
    wind:       <><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></>,
    edit:       <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></>,
    history:    <><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></>,
    search:     <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    alignleft:  <><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></>,
    terminal:   <><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>,
    star:       <><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
    server:     <><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></>,
    refresh:    <><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
    maximize:   <><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></>,
    collapseup: <><polyline points="18 15 12 9 6 15"/></>,
    info:       <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
    more:       <><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/><circle cx="5" cy="12" r="1" fill="currentColor"/></>,
    user:       <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
  };
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={s}>
      {paths[name] || <circle cx="12" cy="12" r="10"/>}
    </svg>
  );
};

// ── TOGGLE ───────────────────────────────────────────────
const Toggle = ({ on, onChange }) => (
  <div onClick={() => onChange(!on)} style={{
    width:44, height:24, borderRadius:12, cursor:'pointer',
    background: on ? C.amber : C.l4,
    position:'relative', transition:'background 0.2s',
    flexShrink:0,
    boxShadow: on ? `0 0 12px ${C.amber}55` : 'none',
  }}>
    <div style={{
      position:'absolute', top:3, left: on ? 23 : 3,
      width:18, height:18, borderRadius:9,
      background: on ? '#0b1326' : C.dimmer,
      transition:'left 0.2s', boxShadow:'0 1px 4px rgba(0,0,0,0.4)',
    }}/>
  </div>
);

// ── PROGRESS BAR ─────────────────────────────────────────
const Bar = ({ value, color=C.blue, height=4 }) => (
  <div style={{ height, background:C.l4, borderRadius:2, overflow:'hidden' }}>
    <div style={{
      height:'100%', width:`${value}%`, borderRadius:2,
      background:color, transition:'width 1s ease',
      boxShadow:`0 0 8px ${color}77`,
    }}/>
  </div>
);

// ── STATUS DOT ───────────────────────────────────────────
const Dot = ({ color }) => (
  <span style={{ display:'inline-block', width:7, height:7, borderRadius:4, background:color, boxShadow:`0 0 6px ${color}` }}/>
);

// ── STAT CARD ────────────────────────────────────────────
const StatCard = ({ label, value, unit, icon, color=C.blue, progress }) => (
  <div style={{ background:C.l2, borderRadius:12, padding:'20px 24px', flex:1 }}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
      <span style={{ fontSize:11, letterSpacing:'0.08em', color:C.dimmer, textTransform:'uppercase', fontWeight:500 }}>{label}</span>
      <Icon name={icon} size={18} color={C.dimmer}/>
    </div>
    <div style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:42, fontWeight:700, color:C.text, lineHeight:1 }}>
      {value}<span style={{ fontSize:22, color }}>{unit}</span>
    </div>
    {progress !== undefined && <Bar value={progress} color={color} style={{ marginTop:12 }}/>}
    {progress !== undefined && <div style={{ marginTop:6 }}><Bar value={progress} color={color} height={4}/></div>}
  </div>
);

// ══════════════════════════════════════════════════════════
// SCREEN: SYSTEM
// ══════════════════════════════════════════════════════════
const SystemScreen = () => {
  const [stats, setStats] = useState({ cpu:5.6, mem:62.8, disk:45, temp:56.2 });
  useEffect(() => {
    const t = setInterval(() => {
      setStats(s => ({
        cpu:  Math.max(1, Math.min(95, s.cpu  + (Math.random()-0.5)*3)).toFixed(1)*1,
        mem:  Math.max(40, Math.min(90, s.mem  + (Math.random()-0.5)*1)).toFixed(1)*1,
        disk: Math.max(20, Math.min(80, s.disk + (Math.random()-0.5)*2)).toFixed(0)*1,
        temp: Math.max(45, Math.min(75, s.temp + (Math.random()-0.5)*1)).toFixed(1)*1,
      }));
    }, 2000);
    return () => clearInterval(t);
  }, []);

  const [containers] = useState([
    { name:'Couchdb',    status:'RUNNING', ram:'124 MB', cpu:'0.2%', uptime:'12d 4h',  port:'5984', image:'couchdb:3.3',      restarts:0, volumes:2 },
    { name:'n8n',        status:'RUNNING', ram:'450 MB', cpu:'2.1%', uptime:'8d 11h',  port:'5678', image:'n8nio/n8n:latest', restarts:1, volumes:3 },
    { name:'Redis',      status:'IDLE',    ram:'32 MB',  cpu:'0.0%', uptime:'12d 4h',  port:'6379', image:'redis:7-alpine',   restarts:0, volumes:1 },
    { name:'Nginx',      status:'RUNNING', ram:'18 MB',  cpu:'0.1%', uptime:'12d 4h',  port:'443',  image:'nginx:1.25',       restarts:0, volumes:2 },
    { name:'Prometheus', status:'RUNNING', ram:'210 MB', cpu:'0.8%', uptime:'5d 2h',   port:'9090', image:'prom/prometheus',  restarts:0, volumes:1 },
    { name:'Grafana',    status:'IDLE',    ram:'95 MB',  cpu:'0.0%', uptime:'5d 2h',   port:'3000', image:'grafana/grafana',  restarts:2, volumes:1 },
  ]);
  const [expandedCard, setExpandedCard] = useState(null);
  const [showAllContainers, setShowAllContainers] = useState(false);
  const [net] = useState([
    { iface:'eth0',    ip:'192.168.1.45', speed:'1.2 GB/s', dir:'↑', status:'Active' },
    { iface:'wlan0',   ip:'Disconnected', speed:'0 B/s',   dir:'',  status:'Down'   },
    { iface:'docker0', ip:'172.17.0.1',   speed:'45 MB/s', dir:'↕', status:'Active' },
  ]);

  const tempColor = stats.temp > 70 ? C.red : stats.temp > 60 ? C.amber : C.blue;
  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:28 }}>
        <div>
          <h1 style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:28, fontWeight:800, marginBottom:4 }}>Pi Dashboard</h1>
          <div style={{ fontSize:12, color:C.dimmer, letterSpacing:'0.06em', textTransform:'uppercase' }}>Blackbox Environment</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:C.l2, borderRadius:8, padding:'8px 16px' }}>
          <Dot color={C.green}/> <span style={{ fontSize:13, color:C.green, fontWeight:600, letterSpacing:'0.04em' }}>CONNECTED</span>
        </div>
      </div>

      {/* Stat row */}
      <div style={{ display:'flex', gap:12, marginBottom:20 }}>
        <StatCard label="CPU Usage" value={stats.cpu} unit="%" icon="cpu" color={C.blue} progress={stats.cpu}/>
        <StatCard label="Memory" value={stats.mem} unit="%" icon="memory" color={C.amber} progress={stats.mem}/>
        <StatCard label="Disk I/O" value={stats.disk} unit="%" icon="hdd" color={C.blue} progress={stats.disk}/>
        <StatCard label="Core Temp" value={stats.temp} unit="°C" icon="thermometer" color={tempColor} progress={(stats.temp-30)/50*100}/>
        <div style={{ background:C.l3, borderRadius:12, padding:'20px 24px', minWidth:140 }}>
          <div style={{ fontSize:11, letterSpacing:'0.08em', color:C.amber, textTransform:'uppercase', fontWeight:500, marginBottom:8 }}>System Uptime</div>
          <Icon name="clock" size={22} color={C.amber}/>
          <div style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:32, fontWeight:800, marginTop:8 }}>
            73<span style={{ fontSize:16, color:C.dimmer }}>d</span> 2<span style={{ fontSize:16, color:C.dimmer }}>h</span>
          </div>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 280px', gap:16 }}>
        <div>
          {/* Docker */}
          <div style={{ background:C.l2, borderRadius:12, padding:'20px 24px', marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
              <Icon name="server" size={16} color={C.blue}/>
              <span style={{ fontWeight:600, letterSpacing:'0.04em', fontSize:14 }}>Docker Containers</span>
              <span style={{ fontSize:11, color:C.dimmer, marginLeft:2 }}>{containers.length} total</span>
              <button onClick={() => setShowAllContainers(true)} style={{
                marginLeft:'auto', fontSize:11, color:C.blue, background:`${C.blue}18`,
                padding:'4px 12px', borderRadius:6, fontWeight:600, letterSpacing:'0.04em',
                display:'flex', alignItems:'center', gap:5, transition:'background 0.15s',
              }}>
                <Icon name="maximize" size={12} color={C.blue}/> VIEW ALL
              </button>
            </div>
            {/* Horizontal slider */}
            <div style={{ display:'flex', gap:12, overflowX:'auto', paddingBottom:6, scrollSnapType:'x mandatory' }}
              className="docker-scroll">
              {containers.map(c => {
                const isExp = expandedCard === c.name;
                const statusColor = c.status==='RUNNING' ? C.green : C.amber;
                return (
                  <div key={c.name}
                    onClick={() => setExpandedCard(isExp ? null : c.name)}
                    style={{
                      background: isExp ? C.l4 : C.l3,
                      borderRadius:10, padding:'16px',
                      minWidth: isExp ? 280 : 180,
                      maxWidth: isExp ? 280 : 180,
                      flexShrink:0, cursor:'pointer',
                      scrollSnapAlign:'start',
                      border:`1px solid ${isExp ? C.blue+'44' : 'transparent'}`,
                      transition:'all 0.25s ease',
                      boxShadow: isExp ? `0 0 20px ${C.blue}22` : 'none',
                    }}>
                    {/* Header */}
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                      <span style={{ fontWeight:700, fontSize:14 }}>{c.name}</span>
                      <span style={{ fontSize:10, fontWeight:600, color:statusColor,
                        background:`${statusColor}18`, padding:'2px 7px', borderRadius:20, letterSpacing:'0.04em',
                        display:'flex', alignItems:'center', gap:4 }}>
                        <Dot color={statusColor}/>{c.status}
                      </span>
                    </div>
                    {/* Base stats always visible */}
                    <div style={{ fontSize:12, color:C.dimmer, display:'grid', gridTemplateColumns:'1fr 1fr', gap:5 }}>
                      <div>RAM</div><div style={{ color:C.text, textAlign:'right', fontWeight:500 }}>{c.ram}</div>
                      <div>CPU</div><div style={{ color:C.text, textAlign:'right', fontWeight:500 }}>{c.cpu}</div>
                    </div>
                    {/* Expanded detail */}
                    {isExp && (
                      <div style={{ marginTop:14, borderTop:`1px solid ${C.l3}`, paddingTop:12 }}>
                        <div style={{ fontSize:12, color:C.dimmer, display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, rowGap:8 }}>
                          <div>Uptime</div><div style={{ color:C.text, textAlign:'right', fontWeight:500 }}>{c.uptime}</div>
                          <div>Port</div><div style={{ color:C.blue, textAlign:'right', fontWeight:500 }}>:{c.port}</div>
                          <div>Restarts</div><div style={{ color:c.restarts>0?C.amber:C.text, textAlign:'right', fontWeight:500 }}>{c.restarts}</div>
                          <div>Volumes</div><div style={{ color:C.text, textAlign:'right', fontWeight:500 }}>{c.volumes}</div>
                        </div>
                        <div style={{ marginTop:10, background:C.bg, borderRadius:6, padding:'6px 8px', fontSize:11, color:C.dimmer, fontFamily:"'JetBrains Mono',monospace" }}>
                          {c.image}
                        </div>
                        <div style={{ display:'flex', gap:6, marginTop:10 }}>
                          <button style={{ flex:1, background:c.status==='RUNNING'?`${C.red}18`:C.green+'18', color:c.status==='RUNNING'?C.red:C.green, borderRadius:6, padding:'6px', fontSize:11, fontWeight:600 }}>
                            {c.status==='RUNNING'?'Stop':'Start'}
                          </button>
                          <button style={{ flex:1, background:`${C.blue}18`, color:C.blue, borderRadius:6, padding:'6px', fontSize:11, fontWeight:600 }}>
                            Restart
                          </button>
                        </div>
                      </div>
                    )}
                    {/* Expand hint */}
                    {!isExp && (
                      <div style={{ marginTop:10, fontSize:10, color:C.dimmer, textAlign:'center', opacity:0.6 }}>
                        click to expand
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* View All Modal */}
          {showAllContainers && (
            <div onClick={() => setShowAllContainers(false)} style={{

// SCREEN: CALENDAR
// ══════════════════════════════════════════════════════════
const CalendarScreen = () => {
  const [currentDate, setCurrentDate] = useState(new Date(2026, 3, 1));
  const [view, setView] = useState('Calendar');
  const [events] = useState([
    { date:'2026-04-01', title:'System Maintenance', color:C.amber },
    { date:'2026-04-02', title:'Review Logs',        color:C.blue  },
    { date:'2026-04-02', title:'Node Update',         color:C.l4   },
    { date:'2026-04-07', title:'Sync w/ Data Team',  color:C.blue  },
    { date:'2026-04-14', title:'Backup Verify',       color:C.green },
    { date:'2026-04-20', title:'Q1 Report',           color:C.amber },
    { date:'2026-04-20', title:'Pi Upgrade',          color:C.blue  },
  ]);

  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = currentDate.toLocaleString('default', { month:'long', year:'numeric' });

  const days = [];
  for (let i=0; i<firstDay; i++) days.push(null);
  for (let d=1; d<=daysInMonth; d++) days.push(d);

  const getEvents = (d) => {
    if (!d) return [];
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return events.filter(e => e.date === key);
  };

  const today = new Date();
  const isToday = (d) => d && year===today.getFullYear() && month===today.getMonth() && d===today.getDate();

  return (
    <div style={{ padding:'28px 32px', height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24 }}>
        <div>
          <h1 style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:28, fontWeight:800 }}>Calendar &amp; Tasks</h1>
          <div style={{ fontSize:13, color:C.dimmer, marginTop:4 }}>Manage schedules and system tasks across all nodes.</div>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <div style={{ display:'flex', background:C.l2, borderRadius:8, overflow:'hidden' }}>
            {['Calendar','Tasks'].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding:'8px 20px', fontSize:13, fontWeight:500,
                background: view===v ? C.l4 : 'transparent',
                color: view===v ? C.text : C.dimmer, transition:'all 0.15s',
              }}>{v}</button>
            ))}
          </div>
          <button style={{ background:C.blue, color:'#0b1326', padding:'8px 18px', borderRadius:8, fontWeight:600, fontSize:13, display:'flex', alignItems:'center', gap:6 }}>
            <Icon name="plus" size={14} color="#0b1326"/> New Event
          </button>
        </div>
      </div>

      {view === 'Calendar' ? (
        <>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <button style={{ color:C.dimmer, padding:'6px' }}
                onClick={() => setCurrentDate(new Date(year, month-1, 1))}><Icon name="chevleft" size={18}/></button>
              <button style={{ color:C.dimmer, padding:'6px' }}
                onClick={() => setCurrentDate(new Date(year, month+1, 1))}><Icon name="chevright" size={18}/></button>
              <span style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:700, fontSize:20 }}>{monthName}</span>
              <button onClick={() => setCurrentDate(new Date())} style={{ fontSize:12, color:C.dimmer, padding:'4px 12px', background:C.l2, borderRadius:6, fontWeight:500 }}>Today</button>
            </div>
            <div style={{ display:'flex', gap:4 }}>
              {['Month','Week','Day'].map(v => (
                <button key={v} style={{ padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:500,
                  background: v==='Month'?C.l4:'transparent', color: v==='Month'?C.text:C.dimmer }}>{v}</button>
              ))}
            </div>
          </div>
          <div style={{ flex:1, background:C.l2, borderRadius:12, overflow:'hidden', display:'flex', flexDirection:'column' }}>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', background:C.l3 }}>
              {['SUN','MON','TUE','WED','THU','FRI','SAT'].map(d => (
                <div key={d} style={{ padding:'10px', textAlign:'center', fontSize:11, color:C.dimmer, fontWeight:600, letterSpacing:'0.08em' }}>{d}</div>
              ))}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', flex:1, gridTemplateRows:'repeat(6, 1fr)' }}>
              {days.map((d,i) => {
                const evs = getEvents(d);
                const itd = isToday(d);
                return (
                  <div key={i} style={{
                    padding:'8px 10px', borderTop:`1px solid ${C.l3}`,
                    borderLeft: i%7!==0 ? `1px solid ${C.l3}` : 'none',
                    background: itd ? C.l4 : 'transparent',
                    cursor: d ? 'pointer' : 'default',
                    transition:'background 0.15s',
                  }}>
                    {d && <div style={{
                      display:'inline-flex', alignItems:'center', justifyContent:'center',
                      width:26, height:26, borderRadius:13,
                      background: itd ? C.blue : 'transparent',

from typing import Dict, Any

class IntelligenceNode:
    def __init__(self, config_path: str):
        self.config = self._load_config(config_path)
        self.status = "initializing"

    def _load_config(self, path: str) -> Dict[str, Any]:
        # Load configuration from secure vault
        if not os.path.exists(path):
            raise FileNotFoundError(f"Config not found: {path}")
        return {"mode": "tactical", "threads": 8}

def main():

if __name__ == "__main__":

const INDEX_JS = `import { initializeSystem } from './core';

const startNode = async () => {
  const config = await loadConfig();
  try {
    // Load primary modules
    const core = await initializeSystem(config);
    core.startListeners();
  } catch (sysErr) {
    console.error('Critical:', sysErr);
    shutdownNode();
  }
}

const config = await loadConfig();
startNode();`;

  ]);

  const files = {

    'Archived_Logs': ['2026-03.log','2026-02.log'],
  };

  const getContent = () => {
    if (activeFile==='main.py') return MAIN_PY;
    if (activeFile==='index.js') return INDEX_JS;
    if (activeFile==='notes.md') return NOTES_MD;
    return '// empty file';
  };

  const sendAi = async () => {
    if (!aiInput.trim()) return;
    const msg = aiInput.trim();
    setAiInput('');
    setAiMessages(m => [...m, { role:'user', content:msg }]);
    setAiLoading(true);
    try {

    const keywords = { py:['import','from','class','def','if','not','raise','return','self','str','Any','Dict'],
                       js:['import','const','async','await','try','catch','function','let','var','return'] };
    const ext = fileExt(file);
    const kws = keywords[ext] || [];
    return code.split('\n').map((line, li) => (

        <span style={{ color:C.dimmer, width:32, textAlign:'right', marginRight:16, userSelect:'none', fontSize:12 }}>{li+1}</span>

          {renderLine(line, kws, ext)}

  };

      if (line.startsWith('# ')) return <span style={{ color:C.blue, fontWeight:700 }}>{line}</span>;

      return <span style={{ color:C.dim }}>{line}</span>;
    }
    const parts = line.split(/(\s+|[().,:\[\]{}=])/);
    return parts.map((p, i) => {
      const isKw = kws.includes(p.trim());
      const isStr = p.startsWith('"') || p.startsWith("'") || p.startsWith('`') || p.startsWith('f"');
      const isComment = (ext==='py' && line.trimStart().startsWith('#')) || (ext==='js' && line.trimStart().startsWith('//'));

      if (isStr) return <span key={i} style={{ color:C.green }}>{p}</span>;
      return <span key={i}>{p}</span>;
    });
  };

            <span onClick={e => { e.stopPropagation(); setTabs(x => x.filter(v=>v!==t)); if(activeFile===t) setActiveFile(tabs[0]); }}
              style={{ color:C.dimmer, opacity:0.5, marginLeft:2, lineHeight:1 }}>×</span>
          </div>

      </div>

      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>

                color: activeFile===f ? C.text : C.dimmer, display:'flex', alignItems:'center', gap:7 }}>
              <span style={{ width:7, height:7, borderRadius:2, background:fileColor(f), flexShrink:0 }}/>

                    <div style={{ fontSize:12, color:C.dim, lineHeight:1.7 }}>{m.content}</div>
                    {m.file && <div style={{ fontSize:11, color:C.dimmer, background:C.l2, padding:'4px 8px', borderRadius:6, marginTop:8, display:'inline-flex', alignItems:'center', gap:5 }}>
                      <Icon name="file" size={11}/> {m.file}
                    </div>}
                    {i===0 && (
                      <div style={{ display:'flex', gap:8, marginTop:10 }}>
                        {['Implement parsing','Explain context'].map(a => (
                          <button key={a} onClick={() => setAiInput(a)} style={{
                            background:C.l3, borderRadius:6, padding:'6px 12px', fontSize:11, color:C.dim,
                            fontWeight:500, transition:'background 0.15s',
                          }}>{a}</button>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{ display:'flex', justifyContent:'flex-end' }}>
                    <div style={{ background:C.l3, borderRadius:10, borderBottomRightRadius:3, padding:'10px 12px', maxWidth:'85%', fontSize:12, color:C.dim, lineHeight:1.7 }}>
                      {m.content}
                    </div>
                  </div>
                )}
              </div>
            ))}
            {aiLoading && (
              <div style={{ display:'flex', gap:4, padding:'4px 0' }}>
                {[0,1,2].map(i => <span key={i} style={{ width:6, height:6, borderRadius:3, background:C.dimmer, animation:`bounce 0.9s ${i*0.2}s infinite` }}/>)}
              </div>
            )}
          </div>
          <div style={{ padding:'12px 14px', borderTop:`1px solid ${C.l3}22` }}>
            <div style={{ display:'flex', gap:8 }}>
              <input value={aiInput} onChange={e=>setAiInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendAi()}
                placeholder="Ask AI to edit code..."
                style={{ flex:1, background:C.l2, border:'none', borderRadius:8, padding:'8px 12px', fontSize:12, color:C.text, outline:'none' }}/>
              <button onClick={sendAi} style={{ background:C.blue, borderRadius:8, padding:'8px 12px', display:'flex', alignItems:'center' }}>
                <Icon name="send" size={14} color="#0b1326"/>
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* Status bar */}
      <div style={{ height:28, background:C.l1, borderTop:`1px solid ${C.l3}22`, display:'flex', alignItems:'center', padding:'0 16px', gap:20, fontSize:11, color:C.dimmer }}>
        <span>Ln 12, Col 45</span><span>SPACES: 4</span><span>UTF-8</span>
        <span style={{ marginLeft:'auto', color:C.blue }}>{fileExt(activeFile).toUpperCase()}</span>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════════════════
// SCREEN: AI CHAT
// ══════════════════════════════════════════════════════════
const AIChatScreen = () => {
  const [messages, setMessages] = useState([
    {
      role:'user', content:'Analyze the current system logs and summarize any anomalies from the last 24 hours. Also, attach context from my Calendar.',
      attachments:['CALENDAR DATA ATTACHED','SYSLOG_24H.LOG']
    },
    {
      role:'assistant',
      content:`I have analyzed the system logs and cross-referenced them with your calendar schedule. Here is the summary:\n\n**Network Spike:** Detected a 45% increase in outbound traffic to external IP \`192.168.1.105\` at 03:14 AM. This correlates with the scheduled backup task.\n\n**Failed Authentication:** 3 failed SSH login attempts from an unknown host (\`45.33.22.11\`) at 11:42 AM. IP has been temporarily blocked by Fail2Ban.\n\nTo permanently blacklist the offending IP, you can run the following command:`,
      code:`sudo ufw deny from 45.33.22.11 to any\nsudo ufw reload`,
      codeLang:'bash'
    },
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [model, setModel] = useState('llama3:8b-instruct');
  const [showModels, setShowModels] = useState(false);
  const scrollRef = useRef(null);
  const models = ['llama3:8b-instruct','llama3:70b','deepseek-coder:7b','mistral:7b','phi3:mini'];

  useEffect(() => { if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, loading]);

  const send = async () => {
    if (!input.trim()) return;
    const msg = input.trim();
    setInput('');
    setMessages(m => [...m, { role:'user', content:msg }]);
    setLoading(true);
    try {
      const reply = await window.claude.complete({
        messages:[
          { role:'user', content:`You are an AI assistant for a Raspberry Pi home server called Intelligence Console. You help with system administration, log analysis, security, and smart home management. Be concise and technical. Use markdown formatting. User message: ${msg}` }
        ]
      });
      setMessages(m => [...m, { role:'assistant', content:reply }]);
    } catch(e) {
      setMessages(m => [...m, { role:'assistant', content:'Connection error. The Ollama endpoint may be unreachable.' }]);
    }
    setLoading(false);
  };

  const renderContent = (content) => {
    const parts = content.split(/\*\*(.*?)\*\*/g);
    return parts.map((p, i) => i%2===1 ? <strong key={i} style={{ color:C.text }}>{p}</strong> : (
      <span key={i} dangerouslySetInnerHTML={{ __html: p.replace(/`([^`]+)`/g, `<code style="background:${C.l4};padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;color:${C.blue}">\$1</code>`) }}/>
    ));
  };

  const [copied, setCopied] = useState(false);
  const copyCode = (code) => {
    navigator.clipboard.writeText(code).catch(()=>{});
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>
      {/* Top bar */}
      <div style={{ padding:'12px 20px', borderBottom:`1px solid ${C.l3}22`, display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ position:'relative' }}>
          <button onClick={() => setShowModels(!showModels)} style={{
            display:'flex', alignItems:'center', gap:8, background:C.l2, borderRadius:8, padding:'7px 14px',
            fontSize:13, fontWeight:600, color:C.amber,
          }}>
            <Dot color={C.amber}/> OLLAMA <Icon name="chevdown" size={14} color={C.amber}/>
          </button>
          {showModels && (
            <div style={{ position:'absolute', top:'calc(100% + 8px)', left:0, background:C.l3, borderRadius:10, overflow:'hidden', zIndex:100, minWidth:200, boxShadow:'0 8px 32px rgba(0,0,0,0.4)' }}>
              {models.map(m => (
                <div key={m} onClick={() => { setModel(m); setShowModels(false); }}
                  style={{ padding:'10px 16px', fontSize:13, color: m===model?C.blue:C.dim, background:m===model?C.l4:'transparent', cursor:'pointer' }}>
                  {m}
                </div>
              ))}
            </div>
          )}
        </div>
        <span style={{ fontSize:13, color:C.dimmer }}>MODEL: {model}</span>
        <div style={{ marginLeft:'auto', display:'flex', gap:12 }}>
          <Icon name="history" size={18} color={C.dimmer}/>
          <Icon name="settings" size={18} color={C.dimmer}/>
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'24px 40px', display:'flex', flexDirection:'column', gap:24 }}>
        <div style={{ textAlign:'center', fontSize:12, color:C.dimmer, letterSpacing:'0.06em' }}>SESSION INITIALIZED • 14:02 PST</div>
        {messages.map((m,i) => (
          <div key={i}>
            {m.role==='user' ? (
              <div style={{ display:'flex', justifyContent:'flex-end' }}>
                <div style={{ maxWidth:'70%', background:C.l3, borderRadius:14, borderBottomRightRadius:4, padding:'16px 18px' }}>
                  <p style={{ fontSize:14, lineHeight:1.7, color:C.dim }}>{m.content}</p>
                  {m.attachments && (
                    <div style={{ display:'flex', gap:8, marginTop:12, flexWrap:'wrap' }}>
                      {m.attachments.map(a => (
                        <span key={a} style={{ background:C.l4, borderRadius:6, padding:'4px 10px', fontSize:11, color:C.dimmer, display:'flex', alignItems:'center', gap:5 }}>
                          <Icon name="paperclip" size={11}/> {a}
                        </span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ) : (
              <div style={{ display:'flex', gap:14 }}>
                <div style={{ width:36, height:36, borderRadius:10, background:C.l3, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <Icon name="bot" size={18} color={C.amber}/>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11, color:C.dimmer, letterSpacing:'0.06em', marginBottom:10 }}>OLLAMA / LOCAL</div>
                  <div style={{ fontSize:14, lineHeight:1.8, color:C.dim }}>{renderContent(m.content)}</div>
                  {m.code && (
                    <div style={{ marginTop:14, background:C.bg, borderRadius:10, overflow:'hidden' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 14px', borderBottom:`1px solid ${C.l3}` }}>
                        <span style={{ fontSize:11, color:C.dimmer, letterSpacing:'0.06em', textTransform:'uppercase' }}>{m.codeLang}</span>
                        <button onClick={() => copyCode(m.code)} style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:C.dimmer }}>
                          <Icon name="copy" size={12}/> {copied?'COPIED!':'COPY'}
                        </button>
                      </div>
                      <pre style={{ padding:'14px', fontFamily:"'JetBrains Mono',monospace", fontSize:13, color:C.dim, lineHeight:1.8, overflow:'auto' }}>{m.code}</pre>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        ))}
        {loading && (
          <div style={{ display:'flex', gap:14 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:C.l3, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Icon name="bot" size={18} color={C.amber}/>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:5, paddingTop:10 }}>
              {[0,1,2].map(i => <span key={i} style={{ width:7, height:7, borderRadius:4, background:C.dimmer, display:'inline-block', animation:`bounce 0.9s ${i*0.2}s infinite` }}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Suggestion */}
      <div style={{ textAlign:'center', padding:'0 0 10px' }}>
        <button onClick={() => setInput('Run diagnostic on router')}
          style={{ background:C.l3, borderRadius:20, padding:'6px 16px', fontSize:12, color:C.amber, display:'inline-flex', alignItems:'center', gap:6 }}>
          <Dot color={C.amber}/> SUGGEST: "RUN DIAGNOSTIC ON ROUTER"
        </button>
      </div>

      {/* Input */}
      <div style={{ padding:'0 20px 20px' }}>
        <div style={{ background:C.l2, borderRadius:14, padding:'14px 16px' }}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }}
            placeholder="Message AI Console..."
            rows={2}
            style={{ width:'100%', background:'transparent', border:'none', outline:'none', fontSize:14, color:C.text, resize:'none', lineHeight:1.6 }}/>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:8 }}>
            <Icon name="plus" size={18} color={C.dimmer} style={{ cursor:'pointer' }}/>
            <Icon name="mic" size={18} color={C.dimmer} style={{ cursor:'pointer' }}/>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:C.dimmer, cursor:'pointer', padding:'4px 10px', background:C.l3, borderRadius:6 }}>
              <Icon name="paperclip" size={12}/> CONTEXT
            </div>
            <div style={{ marginLeft:'auto' }}>
              <button onClick={send} style={{
                width:36, height:36, borderRadius:9, background: input.trim() ? C.blue : C.l4,
                display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.2s',
              }}>
                <Icon name="send" size={15} color={input.trim() ? '#0b1326' : C.dimmer}/>
              </button>
            </div>
          </div>
        </div>
        <div style={{ textAlign:'center', fontSize:11, color:C.dimmer, marginTop:10, letterSpacing:'0.04em' }}>
          AI RESPONSES MAY BE INACCURATE. VERIFY CRITICAL SYSTEM ACTIONS.
        </div>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════════════════
// APP SHELL
// ══════════════════════════════════════════════════════════
const NAV = [
  { id:'system',    icon:'cpu',       label:'System'     },
  { id:'smarthome', icon:'home',      label:'Smart Home' },
  { id:'calendar',  icon:'calendar',  label:'Calendar'   },
  { id:'planner',   icon:'clipboard', label:'Planner'    },
  { id:'editor',    icon:'code',      label:'Editor'     },
  { id:'aichat',    icon:'bot',       label:'AI Chat'    },
];

const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('pi-screen') || 'system');
  const [time, setTime] = useState(new Date());

  useEffect(() => { localStorage.setItem('pi-screen', screen); }, [screen]);
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const screens = { system:SystemScreen, smarthome:SmartHomeScreen, calendar:CalendarScreen, planner:PlannerScreen, editor:EditorScreen, aichat:AIChatScreen };
  const Screen = screens[screen];

  return (
    <div style={{ display:'flex', height:'100vh', background:C.bg, overflow:'hidden' }}>
      {/* Sidebar */}
      <div style={{ width:64, background:C.l0, display:'flex', flexDirection:'column', alignItems:'center', padding:'16px 0', gap:4, flexShrink:0 }}>
        {/* Logo */}
        <div style={{ width:36, height:36, borderRadius:10, background:`${C.blue}22`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
          <Icon name="radio" size={18} color={C.blue}/>
        </div>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setScreen(n.id)} title={n.label} style={{
            width:44, height:44, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center',
            background: screen===n.id ? C.l3 : 'transparent',
            color: screen===n.id ? C.blue : C.dimmer,
            transition:'all 0.15s', position:'relative',
          }}>
            <Icon name={n.icon} size={18}/>
            {screen===n.id && <div style={{ position:'absolute', left:0, top:'50%', transform:'translateY(-50%)', width:3, height:20, background:C.blue, borderRadius:'0 2px 2px 0' }}/>}
          </button>
        ))}
        <div style={{ marginTop:'auto', display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
          <Icon name="settings" size={18} color={C.dimmer}/>
          <div style={{ width:32, height:32, borderRadius:8, background:C.l2, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="user" size={16} color={C.dimmer}/>
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Header */}
        <div style={{ height:48, background:C.l0, display:'flex', alignItems:'center', padding:'0 20px', gap:12, borderBottom:`1px solid ${C.l3}22`, flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:C.l2, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
              <Icon name="server" size={16} color={C.green}/>
              <Dot color={C.green} style={{ position:'absolute', bottom:-1, right:-1 }}/>
            </div>
            <div>
              <div style={{ fontSize:13, fontWeight:700, lineHeight:1.2 }}>NODE-01</div>
              <div style={{ fontSize:10, color:C.green, lineHeight:1.2 }}>ONLINE / 192.168.1.45</div>
            </div>
          </div>
          <div style={{ flex:1, maxWidth:280 }}>
            <div style={{ background:C.l2, borderRadius:8, padding:'7px 14px', display:'flex', alignItems:'center', gap:8 }}>
              <Icon name="search" size={14} color={C.dimmer}/>
              <span style={{ fontSize:13, color:C.dimmer }}>Search commands, files…</span>
              <span style={{ marginLeft:'auto', fontSize:11, color:C.dimmer, background:C.l3, borderRadius:4, padding:'2px 6px' }}>⌘K</span>
            </div>
          </div>
          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:16 }}>
            <span style={{ fontSize:13, color:C.dimmer }}>{time.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}</span>
            <Icon name="radio" size={18} color={C.dimmer}/>
            <Icon name="moon" size={18} color={C.dimmer}/>
            <div style={{ position:'relative' }}>
              <Icon name="bell" size={18} color={C.dimmer}/>
              <div style={{ position:'absolute', top:-3, right:-3, width:8, height:8, borderRadius:4, background:C.red, border:`2px solid ${C.l0}` }}/>
            </div>
          </div>
        </div>

        {/* Screen content */}
        <div style={{ flex:1, overflow:'hidden' }}>
          <Screen/>
        </div>
      </div>
    </div>
  );
};

// Animation styles
const styleEl = document.createElement('style');
styleEl.textContent = `
@keyframes bounce {
  0%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(-6px)}
}
.docker-scroll::-webkit-scrollbar{height:3px}
.docker-scroll::-webkit-scrollbar-track{background:transparent}
.docker-scroll::-webkit-scrollbar-thumb{background:#243356;border-radius:2px}
`;
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
