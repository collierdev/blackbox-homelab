services:
  neo4j:
    image: neo4j:5.15
    container_name: pi-dashboard-neo4j
    restart: always
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    env_file:
      - .env
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-dashboard123}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-dashboard
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOST_HOME_PATH:-/home/jwcollie}:${HOST_HOME_PATH:-/home/jwcollie}:rw
      - ${HOST_MNT_PATH:-/mnt}:${HOST_MNT_PATH:-/mnt}:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - NEO4J_URI=${NEO4J_URI:-bolt://localhost:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-dashboard123}
      - GO2RTC_URL=${GO2RTC_URL:-http://localhost:1984}
      - GO2RTC_PUBLIC_URL=${GO2RTC_PUBLIC_URL:-http://localhost:1984}
      - HA_URL=${HA_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/sync/google/callback}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-http://localhost:8080/api/sync/microsoft/callback}
    network_mode: host
    pid: "host"
    privileged: true
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs:
