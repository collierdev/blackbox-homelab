version: '3.8'

services:
  neo4j:
    image: neo4j:5.15
    container_name: pi-dashboard-neo4j
    restart: always
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/dashboard123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-dashboard
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NODE_ENV=production
      - PORT=8080
      - NEO4J_URI=bolt://localhost:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=dashboard123
      - GO2RTC_URL=http://go2rtc.blackbox
    network_mode: host
    pid: "host"
    privileged: true
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs:
