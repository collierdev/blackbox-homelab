<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Dashboard - Matrix Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #00ff00;
      padding: 20px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 0, 0.03) 2px,
          rgba(0, 255, 0, 0.03) 4px
        );
      pointer-events: none;
      z-index: 1;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .header {
      border: 2px solid #00ff00;
      padding: 20px;
      margin-bottom: 32px;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
      text-align: center;
    }
    .header h1 {
      font-size: 36px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ff00;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 12px;
      color: #00cc00;
    }
    .terminal-box {
      border: 1px solid #00ff00;
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1);
    }
    .terminal-line {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.8;
      color: #00ff00;
    }
    .terminal-prompt {
      color: #00ff00;
    }
    .terminal-command {
      color: #ffff00;
    }
    .terminal-output {
      color: #00cc00;
      margin-left: 20px;
    }
    .stat-line {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dotted rgba(0, 255, 0, 0.3);
    }
    .stat-label {
      color: #00cc00;
    }
    .stat-value {
      color: #00ff00;
      font-weight: bold;
    }
    .progress-terminal {
      height: 12px;
      background: #001100;
      border: 1px solid #00ff00;
      position: relative;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-terminal-fill {
      height: 100%;
      background: #00ff00;
      box-shadow: 0 0 10px #00ff00;
      transition: width 0.5s;
    }
    .service-terminal {
      margin-top: 20px;
    }
    .service-item {
      padding: 6px 0;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-ok {
      color: #00ff00;
    }
    .status-off {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>PI_DASHBOARD.SYS</h1>
      <p>raspberrypi.local [ONLINE]</p>
    </header>
    <div class="terminal-box">
      <div class="terminal-line">
        <span class="terminal-prompt">$></span> <span class="terminal-command">system.status</span>
      </div>
      <div class="terminal-output">
        <div class="stat-line">
          <span class="stat-label">CPU_USAGE:</span>
          <span class="stat-value">42.5%</span>
        </div>
        <div class="progress-terminal">
          <div class="progress-terminal-fill" style="width: 42.5%"></div>
        </div>
        <div class="stat-line">
          <span class="stat-label">MEMORY:</span>
          <span class="stat-value">68.2%</span>
        </div>
        <div class="progress-terminal">
          <div class="progress-terminal-fill" style="width: 68.2%"></div>
        </div>
        <div class="stat-line">
          <span class="stat-label">DISK:</span>
          <span class="stat-value">34.8%</span>
        </div>
        <div class="progress-terminal">
          <div class="progress-terminal-fill" style="width: 34.8%"></div>
        </div>
        <div class="stat-line">
          <span class="stat-label">TEMPERATURE:</span>
          <span class="stat-value">52.3°C</span>
        </div>
      </div>
    </div>
    <div class="terminal-box service-terminal">
      <div class="terminal-line">
        <span class="terminal-prompt">$></span> <span class="terminal-command">services.list</span>
      </div>
      <div class="terminal-output">
        <div class="service-item">
          <span class="status-ok">[OK]</span>
          <span>jellyfin.service - Running</span>
        </div>
        <div class="service-item">
          <span class="status-ok">[OK]</span>
          <span>n8n.service - Running</span>
        </div>
        <div class="service-item">
          <span class="status-off">[OFF]</span>
          <span>home-assistant.service - Stopped</span>
        </div>
      </div>
    </div>
    <div class="terminal-box">
      <div class="terminal-line">
        <span class="terminal-prompt">$></span> <span style="color: #00ff00;">_</span>
      </div>
    </div>
  </div>
</body>
</html>
