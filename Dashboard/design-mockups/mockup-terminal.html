<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Dashboard - Terminal Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .terminal-window {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
    }
    .terminal-header {
      background: #21262d;
      padding: 12px 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f85149;
    }
    .terminal-dot:nth-child(2) {
      background: #fdb033;
    }
    .terminal-dot:nth-child(3) {
      background: #238636;
    }
    .terminal-title {
      margin-left: 12px;
      font-size: 13px;
      color: #8b949e;
    }
    .terminal-body {
      padding: 24px;
      font-size: 14px;
      line-height: 1.8;
    }
    .prompt {
      color: #58a6ff;
    }
    .command {
      color: #79c0ff;
    }
    .output {
      color: #a5a5a5;
      margin: 8px 0 16px 24px;
    }
    .stat-line {
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat-label {
      color: #8b949e;
      width: 120px;
    }
    .stat-bar {
      flex: 1;
      height: 12px;
      background: #21262d;
      border: 1px solid #30363d;
      position: relative;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      background: #238636;
      transition: width 0.5s;
    }
    .stat-value {
      color: #c9d1d9;
      width: 80px;
      text-align: right;
    }
    .service-list {
      margin-top: 16px;
    }
    .service-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
    }
    .status-indicator.stopped {
      background: #8b949e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="terminal-dot"></div>
        <div class="terminal-dot"></div>
        <div class="terminal-dot"></div>
        <span class="terminal-title">pi-dashboard@raspberrypi.local</span>
      </div>
      <div class="terminal-body">
        <div><span class="prompt">$</span> <span class="command">system status</span></div>
        <div class="output">
          <div class="stat-line">
            <span class="stat-label">CPU:</span>
            <div class="stat-bar">
              <div class="stat-bar-fill" style="width: 42.5%"></div>
            </div>
            <span class="stat-value">42.5%</span>
          </div>
          <div class="stat-line">
            <span class="stat-label">Memory:</span>
            <div class="stat-bar">
              <div class="stat-bar-fill" style="width: 68.2%"></div>
            </div>
            <span class="stat-value">68.2%</span>
          </div>
          <div class="stat-line">
            <span class="stat-label">Disk:</span>
            <div class="stat-bar">
              <div class="stat-bar-fill" style="width: 34.8%"></div>
            </div>
            <span class="stat-value">34.8%</span>
          </div>
          <div class="stat-line">
            <span class="stat-label">Temperature:</span>
            <div style="flex: 1;"></div>
            <span class="stat-value">52.3°C</span>
          </div>
        </div>
        <div><span class="prompt">$</span> <span class="command">services list</span></div>
        <div class="output service-list">
          <div class="service-row">
            <span class="status-indicator"></span>
            <span>jellyfin (Docker) - Running</span>
          </div>
          <div class="service-row">
            <span class="status-indicator"></span>
            <span>n8n (Docker) - Running</span>
          </div>
          <div class="service-row">
            <span class="status-indicator stopped"></span>
            <span>home-assistant (Docker) - Stopped</span>
          </div>
        </div>
        <div style="margin-top: 16px;"><span class="prompt">$</span> <span style="color: #8b949e;">_</span></div>
      </div>
    </div>
  </div>
</body>
</html>
