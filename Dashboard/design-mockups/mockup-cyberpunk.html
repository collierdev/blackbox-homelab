<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Dashboard - Cyberpunk Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #00ff41;
      padding: 20px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 65, 0.03) 0px,
          transparent 1px,
          transparent 2px,
          rgba(0, 255, 65, 0.03) 3px
        );
      pointer-events: none;
      z-index: 1;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .header {
      border: 2px solid #00ff41;
      padding: 24px;
      margin-bottom: 32px;
      background: rgba(0, 255, 65, 0.05);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
      position: relative;
    }
    .header::before {
      content: '> ';
      position: absolute;
      left: 12px;
      top: 24px;
      color: #00ff41;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ff41;
      margin-left: 24px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .cyber-card {
      border: 2px solid #00ff41;
      background: rgba(0, 0, 0, 0.8);
      padding: 24px;
      position: relative;
      box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
    }
    .cyber-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      height: 4px;
      background: linear-gradient(90deg, #00ff41, transparent);
    }
    .stat-label {
      font-size: 12px;
      color: #00ff41;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.7;
    }
    .stat-value {
      font-size: 48px;
      font-weight: 700;
      color: #00ff41;
      text-shadow: 0 0 20px #00ff41;
      margin-bottom: 16px;
      font-family: 'Courier New', monospace;
    }
    .progress-bar {
      height: 8px;
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid #00ff41;
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #00ff41;
      box-shadow: 0 0 10px #00ff41;
      transition: width 0.5s;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .service-cyber {
      border: 2px solid #00ff41;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
    }
    .service-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.3);
      padding-bottom: 12px;
    }
    .service-icon {
      font-size: 32px;
      filter: drop-shadow(0 0 5px #00ff41);
    }
    .service-info h3 {
      font-size: 16px;
      color: #00ff41;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-indicator {
      margin-left: auto;
      width: 12px;
      height: 12px;
      background: #00ff41;
      box-shadow: 0 0 10px #00ff41;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .cyber-btn {
      padding: 10px 20px;
      background: transparent;
      border: 2px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .cyber-btn:hover {
      background: #00ff41;
      color: #0a0e27;
      box-shadow: 0 0 20px #00ff41;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>PI_DASHBOARD.exe</h1>
      <div style="margin-left: 24px; margin-top: 8px; font-size: 12px; opacity: 0.7;">raspberrypi.local [CONNECTED]</div>
    </header>
    <div class="stats-grid">
      <div class="cyber-card">
        <div class="stat-label">CPU_USAGE</div>
        <div class="stat-value">42.5%</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 42.5%"></div>
        </div>
      </div>
      <div class="cyber-card">
        <div class="stat-label">MEMORY</div>
        <div class="stat-value">68.2%</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 68.2%"></div>
        </div>
      </div>
      <div class="cyber-card">
        <div class="stat-label">DISK_USAGE</div>
        <div class="stat-value">34.8%</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 34.8%"></div>
        </div>
      </div>
      <div class="cyber-card">
        <div class="stat-label">TEMPERATURE</div>
        <div class="stat-value">52.3°C</div>
      </div>
    </div>
    <div style="margin-top: 32px;">
      <div style="border: 2px solid #00ff41; padding: 16px; margin-bottom: 24px; background: rgba(0, 255, 65, 0.05);">
        <div style="color: #00ff41; text-transform: uppercase; letter-spacing: 2px; font-size: 14px;">> SERVICES</div>
      </div>
      <div class="services-grid">
        <div class="service-cyber">
          <div class="service-header">
            <div class="service-icon">🎬</div>
            <div class="service-info">
              <h3>Jellyfin</h3>
            </div>
            <div class="status-indicator"></div>
          </div>
          <button class="cyber-btn">STOP</button>
          <button class="cyber-btn">RESTART</button>
          <button class="cyber-btn">OPEN</button>
        </div>
        <div class="service-cyber">
          <div class="service-header">
            <div class="service-icon">🤖</div>
            <div class="service-info">
              <h3>n8n</h3>
            </div>
            <div class="status-indicator"></div>
          </div>
          <button class="cyber-btn">STOP</button>
          <button class="cyber-btn">RESTART</button>
          <button class="cyber-btn">OPEN</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
